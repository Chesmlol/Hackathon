    <script>
        async function loadSection(id, url) {
            try {
                const response = await fetch(url);
                if (response.ok) {
                    document.getElementById(id).innerHTML = await response.text();
                } else {
                    console.error(`Failed to load ${url}: ${response.status}`);
                }
            } catch (error) {
                console.error(`Error loading ${url}:`, error);
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadSection("learn-container", "frontend/learn.html");
            loadSection("practice-container", "frontend/practice.html");
            loadSection("ranking-container", "frontend/ranking.html");
        });
    </script>
