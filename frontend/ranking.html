<!DOCTYPE html>
<html lang="{{lang}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ranking.title}}</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .leaderboard-window {
            max-width: 1200px;
            margin: 20px auto;
            background: rgba(0, 255, 100, 0.04);
            border: 2px solid #00ff66;
            padding: 35px;
            box-shadow: 0 0 14px rgba(0, 255, 100, 0.2);
        }
        .rank-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            color: #00ff66;
        }
        .rank-table th {
            text-align: left;
            padding: 12px;
            border-bottom: 2px solid #00ff66;
            text-transform: uppercase;
        }
        .rank-table td {
            padding: 12px;
            border-bottom: 1px solid #333;
        }
        .pagination-area {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }
        .rank-table tr:hover {
            background: rgba(0, 255, 100, 0.1);
            cursor: pointer;
        }

        /* ---- Pagination (matches the /learn page's paging component) ---- */
        .rank-pagination {
            display: flex;
            gap: 6px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 255, 102, 0.2);
        }
        .page-link {
            padding: 6px 12px;
            border: 1px solid #00ff66;
            color: #00ff66;
            text-decoration: none;
            border-radius: 3px;
            font-size: 0.85em;
        }
        .page-link-active {
            background: #00ff66;
            color: #000;
            font-weight: bold;
        }
        .page-link-disabled {
            opacity: 0.3;
            pointer-events: none;
            border-color: #555;
            color: #555;
        }
        .page-ellipsis {
            padding: 6px 4px;
            opacity: 0.6;
        }
        .page-info {
            opacity: 0.7;
            font-size: 0.85em;
        }
    </style>
</head>
<body>

<header>
    <h1>ChanceField</h1>
    <p>{{ranking.tagline}}</p>
</header>

<nav>
    {{nav}}
</nav>

<main>
    <section class="leaderboard-window">
        <table class="rank-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>User</th>
                    <th>Rank</th>
                    <th>Level</th>
                    <th>XP</th>
                    <th>Solved</th>
                </tr>
            </thead>
            <tbody>
                {{rows}}
            </tbody>
        </table>
        
        <div class="rank-pagination">
            {{pagination}}
        </div>
    </section>

</main>

</body>
</html>
