<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} - Official Solution</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/notify.js"></script>
</head>
<body class="oj-bg">

<header>
    <h1>ChanceField</h1>
    <p>&gt; OFFICIAL SOLUTION</p>
</header>

<nav>
    {{nav}}
</nav>

<main style="max-width: 900px; margin: 0 auto;">
    <section class="window">
        <a href="/problem/{{id}}" class="back-btn" style="margin-bottom: 20px; display: inline-block;">&larr; Back to Problem</a>

        <h2>{{title}}</h2>

        {{edit_btn}}

        <div id="solution-content">
            {{content_html}}
        </div>

        {{edit_modal}}
    </section>
</main>

</body>
</html>
