<!DOCTYPE html>
<html lang="{{lang}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RetroCode Academy</title>
    <link rel="stylesheet" href="style.css">
    <script src="/notify.js"></script>
</head>
<body>

<header>
    <h1>ChanceField</h1>
    <p>{{login.header}}</p>
</header>

<nav>
    {{nav}}
</nav>

<div class="window" style="max-width:500px;margin:100px auto;">
    <h2>{{login.heading}}</h2>

    <label for="login-username" class="sr-only">{{login.username_label}}</label>
    <input type="text" id="login-username" placeholder="{{login.username_placeholder}}" autocomplete="username" required>

    <label for="login-password" class="sr-only">{{login.password_label}}</label>
    <input type="password" id="login-password" placeholder="{{login.password_placeholder}}" autocomplete="current-password" required>

    <button type="button" onclick="handleLogin()">{{login.submit_button}}</button>

    <br><br>
    <a href="/" class="back-btn">{{login.back_home}}</a>
</div>

<script>
document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleLogin();
});

async function handleLogin() {
    const usernameElement = document.getElementById('login-username');
    const passwordElement = document.getElementById('login-password');

    if (!usernameElement.value || !passwordElement.value) {
        showNotification("{{login.error_both_required}}", "error");
        return;
    }

    // Matches the application/x-www-form-urlencoded header the backend reads
    const details = new URLSearchParams();
    details.append('username', usernameElement.value);
    details.append('password', passwordElement.value);

    try {
        const response = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: details
        });

        const result = await response.text();
        if (result === "7") {
            showNotification("{{login.success}}", "success");
            setTimeout(() => { window.location.href = "/"; }, 800); // Directs user back to main application entrypoint
        } else {
            showNotification("{{login.error_invalid}}", "error");
        }
    } catch (error) {
        console.error("Error during authentication request:", error);
        showNotification("{{login.error_connection}}", "error");
    }
}
</script>
</body>
</html>
