<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .lesson-window {
            max-width: 960px;
            margin: 20px auto;
            padding: 35px;
            box-shadow: 0 0 14px rgba(0, 255, 100, 0.2);
        }
        .lesson-badges {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            font-size: 0.8em;
            letter-spacing: 1px;
            border-radius: 3px;
            font-weight: bold;
            text-transform: uppercase;
            border: 1px solid currentColor;
        }
        .badge-type   { color: #00ff66; border-color: #00ff66; }
        .diff-10      { color: #00ff66; border-color: #00ff66; }
        .diff-11      { color: #ffcc00; border-color: #ffcc00; }
        .diff-12      { color: #ff3030; border-color: #ff3030; }
        .lesson-desc {
            margin: 15px 0;
            opacity: 0.9;
        }
        .lesson-content {
            margin-top: 20px;
        }
        /* Styling for type="article" lessons: rendered HTML + MathJax math,
           kept in the site's own black/neon-green look instead of a
           white-background embedded PDF. */
        .lesson-article {
            line-height: 1.7;
            color: #e0ffe0;
        }
        .lesson-article h1, .lesson-article h2, .lesson-article h3 {
            color: #00ff66;
            text-shadow: 0 0 6px rgba(0, 255, 100, 0.4);
            margin-top: 28px;
        }
        .lesson-article strong { color: #00ff99; }
        .lesson-article em { color: #ccffcc; }
        .lesson-article .trivlist {
            border-left: 3px solid #00ff66;
            background: rgba(0, 255, 100, 0.05);
            padding: 12px 16px;
            margin: 16px 0;
            border-radius: 0 4px 4px 0;
        }
        .lesson-article mjx-container { color: #ccffcc; }
    </style>
</head>
<body>

<header>
    <h1>ChanceField</h1>
    <p>> LESSON VIEWER</p>
</header>

<nav>
    {{nav}}
</nav>

<main>
    <section class="window lesson-window">
        <div class="lesson-badges">
            <span class="badge badge-type">{{type_icon}} {{type_label}}</span>
            <span class="badge {{diff_class}}">{{diff_label}}</span>
        </div>
        <h2>{{title}}</h2>
        <p class="lesson-desc">{{description}}</p>
        <div class="lesson-content">
            {{content}}
        </div>
    </section>

    <div style="text-align:center; margin-top:20px;">
        <a href="/learn" class="back-btn">← Back to Curriculum</a>
    </div>
</main>

{{mathjax}}
</body>
</html>
